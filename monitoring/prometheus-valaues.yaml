# Prometheus retention and storage
prometheus:
  prometheusSpec:
    retention: 7d
    retentionSize: "1GB"
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: microk8s-hostpath
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 1Gi
    resources:
      requests:
        memory: "512Mi"
        cpu: "250m"
      limits:
        memory: "1Gi"
        cpu: "500m"
    
    # Enable scraping from all namespaces
    serviceMonitorNamespaceSelector: {}
    serviceMonitorSelector: {}
    podMonitorNamespaceSelector: {}
    podMonitorSelector: {}

# Alertmanager configuration
alertmanager:
  enabled: true
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: microk8s-hostpath
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 1Gi

# Grafana configuration (included in this chart)
grafana:
  enabled: true
  adminPassword: 'devops@123'  
  
  persistence:
    enabled: true
    storageClassName: microk8s-hostpath
    accessModes: ["ReadWriteOnce"]
    size: 1Gi
  
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "200m"
  
  # Service type for AWS ALB access
  service:
    type: NodePort
  
  # DISABLE SIDECARS COMPLETELY
  sidecar:
    dashboards:
      enabled: false
    datasources:
      enabled: false

# Node exporter for host metrics
nodeExporter:
  enabled: true

# Kube-state-metrics for Kubernetes objects
kubeStateMetrics:
  enabled: true

# Enable scraping from your app namespace
defaultRules:
  create: true
  rules:
    alertmanager: true
    etcd: true
    configReloaders: true
    general: true
    k8s: true
    kubeApiserverAvailability: true
    kubeApiserverBurnrate: true
    kubeApiserverHistogram: true
    kubeApiserverSlos: true
    kubeControllerManager: true
    kubelet: true
    kubeProxy: true
    kubePrometheusGeneral: true
    kubePrometheusNodeRecording: true
    kubernetesApps: true
    kubernetesResources: true
    kubernetesStorage: true
    kubernetesSystem: true
    kubeSchedulerAlerting: true
    kubeSchedulerRecording: true
    kubeStateMetrics: true
    network: true
    node: true
    nodeExporterAlerting: true
    nodeExporterRecording: true
    prometheus: true
    prometheusOperator: true