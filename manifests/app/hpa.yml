apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: demo-todo-app
  namespace: demo-todo
spec:
  maxReplicas: 4
  metrics:
  - resource:
      name: cpu
      target:
        averageUtilization: 70
        type: Utilization
    type: Resource
  minReplicas: 2
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: demo-todo-app
