# -----------------------------
# Wait for MicroK8s on all nodes
# -----------------------------
- name: Wait for MicroK8s ready on all nodes
  hosts: all
  become: yes
  gather_facts: no

  tasks:
    - name: Wait for MicroK8s (SSM safe)
      shell: microk8s status | grep -q "running"
      register: result
      retries: 15
      delay: 10
      until: result.rc == 0


# -----------------------------
# Generate Join Command
# -----------------------------
- name: Generate join command on master
  hosts: master
  become: yes
  gather_facts: no

  tasks:
    - name: Get current node count
      command: microk8s kubectl get nodes --no-headers
      register: node_list
      ignore_errors: yes

    - name: Generate join command (only if workers not joined)
      command: microk8s add-node
      register: join_output
      when: node_list.stdout_lines | length < 3

    - name: Extract join command
      set_fact:
        join_command: "{{ join_output.stdout_lines | select('search', 'microk8s join') | list | first }}"
      when: join_output is defined


# -----------------------------
# Join Workers
# -----------------------------
- name: Join workers to cluster
  hosts: workers
  become: yes
  gather_facts: no

  tasks:
    - name: Wait for MicroK8s ready
      command: microk8s status --wait-ready

    - name: Check if already part of cluster
      command: microk8s kubectl get nodes
      register: join_status
      ignore_errors: yes

    - name: Join cluster
      command: "{{ hostvars[groups['master'][0]].join_command }}"
      when: join_status.rc != 0 and hostvars[groups['master'][0]].join_command is defined


# -----------------------------
# Configure Cluster
# -----------------------------
- name: Configure cluster (labels + metrics)
  hosts: master
  become: yes
  gather_facts: no

  tasks:
    - name: Wait until all nodes are Ready
      command: microk8s kubectl get nodes --no-headers
      register: nodes_output
      retries: 10
      delay: 30
      until: nodes_output.stdout_lines | length >= 3

    # -----------------------------
    # Label Nodes
    # -----------------------------
    - name: Label master node
      command: >
        microk8s kubectl label node {{ inventory_hostname }}
        node-role=master --overwrite

    - name: Get all node names
      command: microk8s kubectl get nodes -o jsonpath='{.items[*].metadata.name}'
      register: node_names

    - name: Extract worker nodes
      set_fact:
        workers_list: "{{ node_names.stdout.split() | difference([inventory_hostname]) }}"

    - name: Label worker-01
      command: >
        microk8s kubectl label node {{ workers_list[0] }}
        node-role=worker-01 --overwrite
      when: workers_list | length > 0

    - name: Label worker-02
      command: >
        microk8s kubectl label node {{ workers_list[1] }}
        node-role=worker-02 --overwrite
      when: workers_list | length > 1

    # -----------------------------
    # Enable Metrics Server
    # -----------------------------
    - name: Enable metrics server
      command: microk8s enable metrics-server
      register: metrics_result
      failed_when: false

    # -----------------------------
    # Taint Master Node
    # -----------------------------
    - name: Taint master node (no workload scheduling)
      command: >
        microk8s kubectl taint nodes {{ inventory_hostname }}
        node-role=master:NoSchedule --overwrite